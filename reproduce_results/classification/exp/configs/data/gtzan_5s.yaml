batch_size: ${batch_size}
num_classes: 10
data_type: vggish_embeddings

root_dir: ${oc.env:PROCESSED_DATA_DIR}/gtzan

train_dataset:
  _target_: reproduce_results.classification.classification.ClassificationDataset
  data_path: ${data.root_dir}/train_${data.data_type}.npy
  labels_path: ${data.root_dir}/train_genre.npy

valid_dataset:
  _target_: reproduce_results.classification.classification.ClassificationDataset
  data_path: ${data.root_dir}/valid_${data.data_type}.npy
  labels_path: ${data.root_dir}/valid_genre.npy

train_dataloader:
  _target_: torch.utils.data.DataLoader
  batch_size: ${batch_size}
  num_workers: ${num_workers}
  pin_memory: False
  persistent_workers: False

valid_dataloader:
  _target_: torch.utils.data.DataLoader
  batch_size: ${batch_size}
  num_workers: ${num_workers}
  pin_memory: False
  persistent_workers: False
