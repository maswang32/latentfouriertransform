batch_size: ${batch_size}
num_classes: 11
data_type: vggish_embeddings

train_dataset:
  _target_: reproduce_results.classification.classification.ClassificationDataset
  data_path: "/data/hai-res/ycda/processed-datasets/irmas/train_${data.data_type}.npy"
  labels_path: /data/hai-res/ycda/processed-datasets/irmas/train_inst.npy

valid_dataset:
  _target_: reproduce_results.classification.classification.ClassificationDataset
  data_path: "/data/hai-res/ycda/processed-datasets/irmas/valid_${data.data_type}.npy"
