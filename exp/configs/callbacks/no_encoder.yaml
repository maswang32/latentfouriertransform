checkpoint:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: ${run_dir}/checkpoints
  filename: "{step}-{FAD/max_fad:.3f}"
  auto_insert_metric_name: False
  monitor: "FAD/max_fad"
  mode: min
  save_top_k: 1
  save_last: True

lr_monitor:
  _target_: lightning.pytorch.callbacks.LearningRateMonitor
  logging_interval: step

fad_and_reconstruction:
  _target_: reproduce_results.baselines_and_ablations.no_encoder.NoEncoderFADAndReconstruction
  num_samples: 512
  num_steps: 35
  low_highs: 
    [
      [0.0000, 0.0000],
      [0.0001, 0.0157],
      [0.0157, 0.0313],
      [0.0313, 0.0626],
      [0.0626, 0.1251],
      [0.1251, 0.2501],
      [0.2501, 0.5001],
      [0.5001, 1.0000],
    ]
  pbar: True
